<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rose Garden River - 玫瑰花園漂漂河</title>
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, increment, getDocs, query, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAsWBri5jXHVVDRPCZnpryNhMmIcp4xWSk",
      authDomain: "project-2109503240252587722.firebaseapp.com",
      projectId: "project-2109503240252587722",
      storageBucket: "project-2109503240252587722.firebasestorage.app",
      messagingSenderId: "843744395245",
      appId: "1:843744395245:web:875876a844dfe4ea4e31e4",
      measurementId: "G-D0Y1DQH53V"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messagesRef = collection(db, "sticky_notes");

    window.db = db;
    window.doc = doc;
    window.deleteDoc = deleteDoc;
    window.updateDoc = updateDoc;
    window.increment = increment;
    window.messagesRef = messagesRef;
    window.addDoc = addDoc;
    window.getDocs = getDocs;
    window.query = query;
    window.limit = limit;
    window.onSnapshot = onSnapshot;
    window.serverTimestamp = serverTimestamp;
  </script>

  <style>
    :root {
      --main-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --text-dark: #3a2e2b;
      --accent-rose: #8b5a52;
      --accent-rose-hover: #a36d64;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--main-font);
      color: var(--text-dark);
      min-height: 100svh;
      width: 100vw;
      overflow: hidden;
      position: relative;
      background-color: #f7f2ef;
    }

    /* 右上角純文字鎖頭與內嵌密碼輸入面板 */
    .admin-container {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 2500;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .admin-toggle-btn {
      background: transparent;
      border: none;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.2s, transform 0.2s;
      line-height: 1;
      padding: 4px;
    }
    .admin-toggle-btn:hover {
      opacity: 0.9;
      transform: scale(1.15);
    }

    .admin-panel {
      display: none;
      background: #ffffff;
      border: 1px solid #e2d2cc;
      padding: 6px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(58, 46, 43, 0.15);
      align-items: center;
    }

    .admin-panel input {
      font-family: var(--main-font);
      width: 100px;
      background: #faf6f5;
      border: 1px solid #e2d2cc;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      outline: none;
    }
    .admin-panel input:focus {
      border-color: var(--accent-rose);
    }

    /* ---------------- 階段 1：中央輸入面板 ---------------- */
    .input-stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100svh;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      background: rgba(247, 242, 239, 0.80);
      backdrop-filter: blur(12px);
      padding: 16px;
    }

    .input-card {
      position: relative;
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border: 1.5px solid #e2d2cc;
      padding: 28px 24px;
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(139, 90, 82, 0.18);
      display: flex;
      flex-direction: column;
      gap: 16px;
      color: var(--text-dark);
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 18px;
      background: transparent;
      border: none;
      color: #9c7b74;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
    }
    .close-btn:hover { color: var(--accent-rose); }

    .input-card h1 {
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      color: var(--accent-rose);
      font-family: var(--main-font);
    }

    .input-card input, .input-card textarea {
      font-family: var(--main-font);
      width: 100%;
      background: #faf6f5;
      border: 1.5px solid #e2d2cc;
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text-dark);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-card input:focus, .input-card textarea:focus {
      border-color: var(--accent-rose);
      box-shadow: 0 0 0 3px rgba(139, 90, 82, 0.15);
    }

    .input-card textarea {
      resize: none;
      height: 130px;
    }

    .submit-btn {
      font-family: var(--main-font);
      width: 100%;
      background: var(--accent-rose);
      color: #ffffff;
      font-weight: 600;
      border: none;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(139, 90, 82, 0.25);
    }
    .submit-btn:hover { background: var(--accent-rose-hover); }

    /* ---------------- 階段 2：無限水平滾動畫布 ---------------- */
    .viewport {
      width: 100vw;
      height: 100svh;
      overflow-x: auto;
      overflow-y: hidden;
      cursor: grab;
      position: relative;
      user-select: none;
      -webkit-overflow-scrolling: touch;
    }
    .viewport:active { cursor: grabbing; }

    .viewport::-webkit-scrollbar { height: 4px; }
    .viewport::-webkit-scrollbar-thumb {
      background: rgba(139, 90, 82, 0.25);
      border-radius: 10px;
    }

    .board-stage {
      position: absolute;
      top: 0;
      left: 0;
      height: 100svh;
      min-width: 100vw;
      padding: 20px;
      pointer-events: auto;
      perspective: 1000px;
      background-color: #f7f2ef;
    }

    /* 預設（電腦版背景圖） */
    .board-stage::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://images.pexels.com/photos/38313605/pexels-photo-38313605.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: repeat-x;
      opacity: 0.60;
      z-index: 0;
      pointer-events: none;
    }

    /* 手機版背景圖切換（當螢幕寬度小於等於 768px 時生效） */
    @media (max-width: 768px) {
      .board-stage::before {
        background-image: url('https://images.plurk.com/2twQxiNJxYn1PJkwMKgGQY.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
    }

    /* 便利貼本體 */
    .sticky-note {
      font-family: var(--main-font);
      position: absolute;
      z-index: 1;
      width: 170px;
      height: 140px;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(58, 46, 43, 0.15), 0 2px 6px rgba(0, 0, 0, 0.04);
      border: 1.5px solid rgba(255, 255, 255, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 0.92;
      transition: transform 0.3s ease, opacity 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      animation: pasteIn 0.5s ease-out forwards, 
                 smoothRiverFlow 12s ease-in-out infinite alternate;
      user-select: none;
      will-change: transform;
    }

    @keyframes smoothRiverFlow {
      0% { transform: translate3d(0, 0, 0) rotate(var(--rot)); }
      50% { transform: translate3d(var(--dx1), var(--dy1), 0) rotate(calc(var(--rot) + 2deg)); }
      100% { transform: translate3d(var(--dx2), var(--dy2), 0) rotate(calc(var(--rot) - 2deg)); }
    }

    @keyframes pasteIn {
      from { opacity: 0; transform: scale(1.2) rotate(calc(var(--rot) + 5deg)); }
      to { opacity: 0.92; transform: scale(1) rotate(var(--rot)); }
    }

    .sticky-note:hover {
      opacity: 1 !important;
      transform: scale(1.08) rotate(0deg) !important;
      z-index: 9999 !important;
      box-shadow: 0 18px 38px rgba(58, 46, 43, 0.22);
    }

    .sticky-content {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
      color: #2b211f;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-height: 70px; 
    }

    .more-indicator {
      color: #70504a;
      font-size: 10px;
      font-weight: bold;
      text-align: right;
      margin-top: 2px;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px dashed rgba(58, 46, 43, 0.18);
      padding-top: 4px;
      margin-top: 2px;
    }

    .sticky-author {
      font-size: 11px;
      font-weight: 700;
      color: #5c423d;
    }

    .action-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .like-btn {
      font-family: var(--main-font);
      background: transparent;
      border: none;
      font-size: 12px;
      cursor: pointer;
      color: #b54545;
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 2px;
    }

    .admin-delete-btn {
      font-family: var(--main-font);
      background: transparent;
      color: #b54545;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: none;
      line-height: 1;
      padding: 2px 4px;
    }

    /* ---------------- 階段 3：點擊查看全文彈窗 ---------------- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100svh;
      background: rgba(58, 46, 43, 0.35);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .modal-card {
      font-family: var(--main-font);
      width: 100%;
      max-width: 380px;
      min-height: 200px;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 25px 50px rgba(58, 46, 43, 0.25);
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      z-index: 2001;
      background: #fff;
    }

    .modal-text {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.6;
      color: #2b211f;
      max-height: 260px;
      overflow-y: auto;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      border-top: 1px dashed rgba(58, 46, 43, 0.2);
      padding-top: 8px;
    }

    .modal-author {
      font-size: 13px;
      font-weight: 700;
      color: #5c423d;
    }

    .modal-delete-btn {
      font-family: var(--main-font);
      background: transparent;
      color: #b54545;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: none;
      line-height: 1;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: transparent;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #5c423d;
      padding: 4px;
    }

    /* 手機優化版 Paste📝 按鈕 */
    .re-enter-btn {
      font-family: var(--main-font);
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--accent-rose);
      color: #ffffff;
      font-weight: 700;
      border: none;
      padding: 14px 24px;
      border-radius: 35px;
      cursor: pointer;
      font-size: 15px;
      z-index: 3000;
      box-shadow: 0 8px 20px rgba(139, 90, 82, 0.35);
      display: block; 
    }
  </style>
</head>
<body>

  <!-- 右上角純文字鎖頭與內嵌密碼輸入面板 -->
  <div class="admin-container">
    <button class="admin-toggle-btn" id="adminToggleBtn">🔒</button>
    <div class="admin-panel" id="adminPanel">
      <input type="password" id="adminPasswordInput" />
    </div>
  </div>

  <!-- 1. 輸入面板 -->
  <div class="input-stage" id="inputStage">
    <div class="input-card">
      <button class="close-btn" id="closeBtn">✕</button>
      <h1>✍️ 寫一張玫瑰花園漂漂河</h1>
      <input type="text" id="nickname" placeholder="你的暱稱..." maxlength="12" />
      <textarea id="message" placeholder="寫下一句話..."></textarea>
      <button class="submit-btn" id="submitBtn">送出便利貼</button>
    </div>
  </div>

  <!-- 2. 無限水平滾動畫布 -->
  <div class="viewport" id="viewport">
    <div class="board-stage" id="boardStage"></div>
  </div>

  <!-- 3. 查看全文彈窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card" id="modalCard">
      <button class="modal-close" id="modalCloseBtn">✕</button>
      <div class="modal-text" id="modalText"></div>
      <div class="modal-footer">
        <div class="modal-author" id="modalAuthor"></div>
        <button class="modal-delete-btn" id="modalDeleteBtn">×</button>
      </div>
    </div>
  </div>

  <button class="re-enter-btn" id="reEnterBtn"> Paste📝</button>

  <script type="module">
    let lastHue = null;
    let isAdmin = localStorage.getItem('isAdminUnlocked') === 'true';

    const adminToggleBtn = document.getElementById('adminToggleBtn');
    const adminPanel = document.getElementById('adminPanel');
    const adminPasswordInput = document.getElementById('adminPasswordInput');

    if (adminToggleBtn) {
      adminToggleBtn.innerText = isAdmin ? '🔓' : '🔒';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const toggleBtn = document.getElementById('adminToggleBtn');
      const panel = document.getElementById('adminPanel');
      const pwdInput = document.getElementById('adminPasswordInput');

      if (toggleBtn) {
        toggleBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (isAdmin) {
            isAdmin = false;
            localStorage.removeItem('isAdminUnlocked');
            toggleBtn.innerText = '🔒';
            panel.style.display = 'none';
            location.reload();
          } else {
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
            if (panel.style.display === 'flex') {
              pwdInput.value = '';
              pwdInput.focus();
            }
          }
        });
      }

      if (pwdInput) {
        pwdInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            if (pwdInput.value === "two851011") {
              isAdmin = true;
              localStorage.setItem('isAdminUnlocked', 'true');
              toggleBtn.innerText = '🔓';
              panel.style.display = 'none';
              pwdInput.value = '';
              location.reload();
            } else {
              pwdInput.value = '';
              pwdInput.focus();
            }
          }
        });
      }

      document.addEventListener('click', (e) => {
        if (panel && !panel.contains(e.target) && e.target !== toggleBtn) {
          panel.style.display = 'none';
        }
      });
    });

    function generateDynamicMorandiColor() {
      let hue;
      do {
        hue = Math.floor(Math.random() * 360);
      } while (lastHue !== null && Math.abs(hue - lastHue) < 25);
      lastHue = hue;

      const saturation = Math.floor(Math.random() * 20) + 40;
      const lightness = Math.floor(Math.random() * 8) + 86;
      return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    }

    const NOTES_PER_PAGE = 15;
    const NOTE_WIDTH = 170;
    const NOTE_HEIGHT = 140;

    let globalNoteCount = 0;
    const renderedDocIds = new Set();
    let currentUnusedSlotsInPage = [];

    function generate15NonOverlappingShuffledSlots(pageIndex) {
      const pageWidth = window.innerWidth;
      const pageHeight = window.innerHeight;
      const cols = 5;
      const rows = 3;
      const cellWidth = pageWidth / cols;
      const cellHeight = pageHeight / rows;
      let slots = [];

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cellX = pageIndex * pageWidth + c * cellWidth;
          const cellY = r * cellHeight;
          const maxOffsetX = Math.max(0, cellWidth - NOTE_WIDTH - 15);
          const maxOffsetY = Math.max(0, cellHeight - NOTE_HEIGHT - 15);
          const randomX = cellX + 10 + Math.floor(Math.random() * maxOffsetX);
          const randomY = cellY + 10 + Math.floor(Math.random() * maxOffsetY);
          
          const isTooCloseToButton = (randomX > pageWidth - 180 && randomY > pageHeight - 90);
          if (!isTooCloseToButton) {
            slots.push({ x: randomX, y: randomY });
          }
        }
      }

      if (slots.length === 0) {
        slots.push({ x: pageIndex * pageWidth + 30, y: 30 });
      }

      for (let i = slots.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [slots[i], slots[j]] = [slots[j], slots[i]];
      }
      return slots;
    }

    function getNext15GuaranteedPosition(index) {
      if (currentUnusedSlotsInPage.length === 0) {
        const pageIndex = Math.floor(index / NOTES_PER_PAGE);
        currentUnusedSlotsInPage = generate15NonOverlappingShuffledSlots(pageIndex);
      }
      return currentUnusedSlotsInPage.pop();
    }

    const checkFirebase = setInterval(() => {
      if (window.messagesRef) {
        clearInterval(checkFirebase);
        initApp();
      }
    }, 100);

    function initApp() {
      const inputStage = document.getElementById('inputStage');
      const nicknameInput = document.getElementById('nickname');
      const messageInput = document.getElementById('message');
      const submitBtn = document.getElementById('submitBtn');
      const reEnterBtn = document.getElementById('reEnterBtn');
      const closeBtn = document.getElementById('closeBtn');

      const modalOverlay = document.getElementById('modalOverlay');
      const modalCloseBtn = document.getElementById('modalCloseBtn');
      const modalDeleteBtn = document.getElementById('modalDeleteBtn');
      const viewport = document.getElementById('viewport');

      function hideInputModal() {
        inputStage.style.display = 'none';
      }

      function showInputModal() {
        inputStage.style.display = 'flex';
        nicknameInput.focus();
      }

      modalCloseBtn.addEventListener('click', () => { modalOverlay.style.display = 'none'; });
      modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.style.display = 'none';
      });

      let isMouseDown = false, startMouseX = 0, startScrollLeft = 0, velocity = 0, lastX = 0, animationFrameId = null;

      function stopInertia() {
        if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
      }

      function applyInertia() {
        if (Math.abs(velocity) > 0.5) {
          viewport.scrollLeft -= velocity;
          velocity *= 0.92;
          animationFrameId = requestAnimationFrame(applyInertia);
        } else { velocity = 0; }
      }

      viewport.addEventListener('mousedown', (e) => {
        if (e.target.closest('.sticky-note') || e.target.closest('.re-enter-btn') || e.target.closest('.input-stage') || e.target.closest('.admin-container')) return;
        stopInertia();
        isMouseDown = true;
        startMouseX = e.pageX;
        lastX = e.pageX;
        startScrollLeft = viewport.scrollLeft;
        velocity = 0;
      });

      window.addEventListener('mousemove', (e) => {
        if (!isMouseDown) return;
        e.preventDefault();
        const currentX = e.pageX;
        viewport.scrollLeft = startScrollLeft - (currentX - startMouseX);
        velocity = currentX - lastX;
        lastX = currentX;
      });

      window.addEventListener('mouseup', () => {
        if (!isMouseDown) return;
        isMouseDown = false;
        applyInertia();
      });

      viewport.addEventListener('wheel', (e) => {
        stopInertia();
        if (e.deltaY !== 0) viewport.scrollLeft += e.deltaY;
      }, { passive: true });

      const q = window.query(window.messagesRef, window.limit(100));
      
      window.getDocs(q).then((querySnapshot) => {
        querySnapshot.forEach((docSnap) => {
          const docId = docSnap.id;
          if (!renderedDocIds.has(docId)) {
            renderedDocIds.add(docId);
            createStickyNote(docId, docSnap.data());
          }
        });
      }).catch((err) => {
        console.log("初始化載入中...");
      });

      window.onSnapshot(q, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          const docId = change.doc.id;
          if (change.type === "added") {
            if (!renderedDocIds.has(docId)) {
              renderedDocIds.add(docId);
              createStickyNote(docId, change.doc.data());
            }
          }
          if (change.type === "modified") {
            const data = change.doc.data();
            const countEl = document.getElementById(`like-count-${docId}`);
            if (countEl) {
              countEl.innerText = data.likes || 0;
            }
          }
          if (change.type === "removed") {
            renderedDocIds.delete(docId);
            const el = document.getElementById(`note-${docId}`);
            if (el) el.remove();
            if (modalOverlay.style.display === 'flex' && modalDeleteBtn.dataset.currentId === docId) {
              modalOverlay.style.display = 'none';
            }
          }
        });
      });

      async function submitNote() {
        const nickname = nicknameInput.value.trim();
        const text = messageInput.value.trim();
        if (!nickname || !text) {
          alert("請填寫暱稱與內容！");
          return;
        }

        submitBtn.innerText = "傳送中...";
        submitBtn.disabled = true;

        try {
          if (window.addDoc && window.messagesRef) {
            await window.addDoc(window.messagesRef, {
              nickname: nickname,
              text: text,
              likes: 0,
              timestamp: window.serverTimestamp()
            });
            nicknameInput.value = '';
            messageInput.value = '';
            hideInputModal();
          }
        } catch (err) {
          alert("發布到雲端失敗：" + err.message);
        } finally {
          submitBtn.innerText = "送出便利貼";
          submitBtn.disabled = false;
        }
      }

      submitBtn.addEventListener('click', submitNote);
      closeBtn.addEventListener('click', hideInputModal);
      reEnterBtn.addEventListener('click', showInputModal);
    }

    function createStickyNote(docId, data) {
      const boardStage = document.getElementById('boardStage');
      if (!boardStage) return;

      const note = document.createElement('div');
      note.className = 'sticky-note';
      note.id = `note-${docId}`;

      const randomColor = generateDynamicMorandiColor();
      note.style.backgroundColor = randomColor;

      const pos = getNext15GuaranteedPosition(globalNoteCount);
      globalNoteCount++;

      note.style.left = `${pos.x}px`;
      note.style.top = `${pos.y}px`;

      const pageIndex = Math.floor((globalNoteCount - 1) / NOTES_PER_PAGE);
      const minCanvasWidth = (pageIndex + 1) * window.innerWidth;
      if (minCanvasWidth > boardStage.offsetWidth) {
        boardStage.style.width = `${minCanvasWidth}px`;
      }

      const randomRot = (Math.random() * 16 - 8).toFixed(1);
      const dx1 = (Math.random() * 12 - 6).toFixed(0) + 'px';
      const dy1 = (Math.random() * 12 - 6).toFixed(0) + 'px';
      const dx2 = (Math.random() * 14 - 7).toFixed(0) + 'px';
      const dy2 = (Math.random() * 14 - 7).toFixed(0) + 'px';
      const duration = (Math.random() * 4 + 10).toFixed(1) + 's';

      note.style.setProperty('--rot', `${randomRot}deg`);
      note.style.setProperty('--dx1', dx1);
      note.style.setProperty('--dy1', dy1);
      note.style.setProperty('--dx2', dx2);
      note.style.setProperty('--dy2', dy2);
      note.style.animationDuration = `0.5s, ${duration}`;

      const nickname = escapeHtml(data.nickname || '無名氏');
      const fullText = escapeHtml(data.text || '');
      const likesCount = data.likes || 0;

      note.innerHTML = `
        <div>
          <div class="sticky-content" id="content-${docId}">${fullText}</div>
          <div class="more-indicator" id="indicator-${docId}" style="display:none;">[...more]</div>
        </div>
        <div class="footer-row">
          <div class="sticky-author">— ${nickname}</div>
          <div class="action-group">
            <button class="like-btn" id="like-btn-${docId}">💗 <span id="like-count-${docId}">${likesCount}</span></button>
            <button class="admin-delete-btn" id="del-btn-${docId}" style="display: ${isAdmin ? 'block' : 'none'};">×</button>
          </div>
        </div>
      `;

      boardStage.appendChild(note);

      setTimeout(() => {
        const contentEl = document.getElementById(`content-${docId}`);
        const indicatorEl = document.getElementById(`indicator-${docId}`);
        if (contentEl && indicatorEl && contentEl.scrollHeight > contentEl.clientHeight) {
          indicatorEl.style.display = 'block';
        }
      }, 50);

      const likeBtn = document.getElementById(`like-btn-${docId}`);
      likeBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        try {
          const noteRef = window.doc(window.db, "sticky_notes", docId);
          await window.updateDoc(noteRef, {
            likes: window.increment(1)
          });
        } catch (err) {
          console.log("按愛心失敗：" + err.message);
        }
      });

      const delBtn = document.getElementById(`del-btn-${docId}`);
      if (delBtn) {
        delBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          await deleteNoteFromCloud(docId);
        });
      }

      note.addEventListener('click', () => {
        const modalOverlay = document.getElementById('modalOverlay');
        const modalText = document.getElementById('modalText');
        const modalAuthor = document.getElementById('modalAuthor');
        const modalDeleteBtn = document.getElementById('modalDeleteBtn');
        
        modalText.innerText = data.text || '';
        modalAuthor.innerText = `— ${nickname}`;
        modalDeleteBtn.dataset.currentId = docId;

        if (isAdmin) {
          modalDeleteBtn.style.display = 'block';
        } else {
          modalDeleteBtn.style.display = 'none';
        }

        modalOverlay.style.display = 'flex';
      });

      return note;
    }

    async function deleteNoteFromCloud(docId) {
      try {
        if (window.deleteDoc && window.doc && window.db) {
          await window.deleteDoc(window.doc(window.db, "sticky_notes", docId));
        }
      } catch (err) {
        console.log("刪除失敗：" + err.message);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const modalDeleteBtn = document.getElementById('modalDeleteBtn');
      if (modalDeleteBtn) {
        modalDeleteBtn.addEventListener('click', async () => {
          const docId = modalDeleteBtn.dataset.currentId;
          if (docId) {
            await deleteNoteFromCloud(docId);
          }
        });
      }
    });

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
