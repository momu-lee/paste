<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rose Garden River - 玫瑰花園漂漂河</title>
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, increment, getDocs, query, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAsWBri5jXHVVDRPCZnpryNhMmIcp4xWSk",
      authDomain: "project-2109503240252587722.firebaseapp.com",
      projectId: "project-2109503240252587722",
      storageBucket: "project-2109503240252587722.firebasestorage.app",
      messagingSenderId: "843744395245",
      appId: "1:843744395245:web:875876a844dfe4ea4e31e4",
      measurementId: "G-D0Y1DQH53V"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messagesRef = collection(db, "sticky_notes");

    window.db = db;
    window.doc = doc;
    window.deleteDoc = deleteDoc;
    window.updateDoc = updateDoc;
    window.increment = increment;
    window.messagesRef = messagesRef;
    window.addDoc = addDoc;
    window.getDocs = getDocs;
    window.query = query;
    window.limit = limit;
    window.onSnapshot = onSnapshot;
    window.serverTimestamp = serverTimestamp;
  </script>

  <style>
    :root {
      --main-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --text-dark: #3a2e2b;
      --accent-rose: #8b5a52;
      --accent-rose-hover: #a36d64;
      --error-red: #d90429;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--main-font);
      color: var(--text-dark);
      min-height: 100svh;
      width: 100vw;
      overflow: hidden;
      position: relative;
      background-color: #f7f2ef;
    }

    /* 右上角鎖頭與 Hover/Click 控制區塊 */
    .admin-container {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 2500;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .admin-toggle-btn {
      background: transparent;
      border: none;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.2s;
      line-height: 1;
      padding: 4px;
    }
    .admin-toggle-btn:hover {
      opacity: 1;
      transform: scale(1.2);
    }

    .admin-panel {
      display: none;
      background: #ffffff;
      border: 1px solid #e2d2cc;
      padding: 12px 14px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(58, 46, 43, 0.18);
      flex-direction: column;
      gap: 10px;
      min-width: 150px;
    }

    body.is-unlocked .admin-container:hover .admin-panel {
      display: flex !important;
    }

    .admin-panel input {
      font-family: var(--main-font);
      width: 100%;
      background: #faf6f5;
      border: 1px solid #e2d2cc;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      outline: none;
    }
    .admin-panel input:focus {
      border-color: var(--accent-rose);
    }

    .admin-dashboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dark);
      border-bottom: 1px dashed #e2d2cc;
      padding-bottom: 8px;
    }

    .admin-stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .admin-stat-value {
      color: var(--accent-rose);
      font-weight: 700;
    }

    .export-btn {
      font-family: var(--main-font);
      background: var(--accent-rose);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      text-align: center;
    }
    .export-btn:hover {
      background: var(--accent-rose-hover);
    }

    /* ---------------- 階段 1：中央輸入面板 ---------------- */
    .input-stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100svh;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      background: rgba(247, 242, 239, 0.80);
      backdrop-filter: blur(12px);
      padding: 16px;
    }

    .input-card {
      position: relative;
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border: 1.5px solid #e2d2cc;
      padding: 28px 24px;
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(139, 90, 82, 0.18);
      display: flex;
      flex-direction: column;
      gap: 12px;
      color: var(--text-dark);
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 18px;
      background: transparent;
      border: none;
      color: #9c7b74;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
    }
    .close-btn:hover { color: var(--accent-rose); }

    .input-card h1 {
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      color: var(--accent-rose);
      font-family: var(--main-font);
      margin-bottom: 4px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .error-msg {
      color: var(--error-red);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 3px;
      display: none;
      text-align: left;
    }

    .input-card input, .input-card textarea {
      font-family: var(--main-font);
      width: 100%;
      background: #faf6f5;
      border: 1.5px solid #e2d2cc;
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text-dark);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-card input:focus, .input-card textarea:focus {
      border-color: var(--accent-rose);
      box-shadow: 0 0 0 3px rgba(139, 90, 82, 0.15);
    }

    .input-card textarea {
      resize: none;
      height: 110px;
    }

    .submit-btn {
      font-family: var(--main-font);
      width: 100%;
      background: var(--accent-rose);
      color: #ffffff;
      font-weight: 600;
      border: none;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(139, 90, 82, 0.25);
      margin-top: 4px;
    }
    .submit-btn:hover { background: var(--accent-rose-hover); }

    /* ---------------- 階段 2：滾動畫布 ---------------- */
    .viewport {
      width: 100vw;
      height: 100svh;
      overflow-x: auto;
      overflow-y: hidden;
      cursor: grab;
      position: relative;
      user-select: none;
      -webkit-overflow-scrolling: touch;
    }
    .viewport:active { cursor: grabbing; }

    .viewport::-webkit-scrollbar { height: 4px; width: 4px; }
    .viewport::-webkit-scrollbar-thumb {
      background: rgba(139, 90, 82, 0.25);
      border-radius: 10px;
    }

    .board-stage {
      position: absolute;
      top: 0;
      left: 0;
      height: 100svh;
      min-width: 100vw;
      padding: 20px;
      pointer-events: auto;
      perspective: 1000px;
      background-color: #f7f2ef;
    }

    .board-stage::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://images.plurk.com/5ArczENfHfiCizPsxdPlex.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: repeat-x;
      opacity: 0.60;
      z-index: 0;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .viewport {
        overflow-x: hidden;
        overflow-y: auto;
      }
      .board-stage {
        width: 100vw !important;
        min-height: 100svh;
        height: auto !important;
        padding-bottom: 100px;
      }
      .board-stage::before {
        background-image: url('https://images.plurk.com/2twQxiNJxYn1PJkwMKgGQY.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: repeat-y;
      }
    }

    .sticky-note {
      font-family: var(--main-font);
      position: absolute;
      z-index: 1;
      width: 170px;
      height: 140px;
      padding: 10px 12px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(58, 46, 43, 0.15), 0 2px 6px rgba(0, 0, 0, 0.04);
      border: 1.5px solid rgba(255, 255, 255, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 0.92;
      transition: transform 0.3s ease, opacity 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      animation: pasteIn 0.5s ease-out forwards, 
                 smoothRiverFlow 12s ease-in-out infinite alternate;
      user-select: none;
      will-change: transform;
    }

    /* ✨ 柔和珍珠白光圈 (無 Fade Out，維持發光直到時間到直接關閉) */
    .sticky-note.new-paste-flash {
      box-shadow: 0 0 22px rgba(255, 255, 255, 0.95), 0 0 40px rgba(255, 255, 255, 0.7), 0 10px 25px rgba(58, 46, 43, 0.15) !important;
      border-color: #ffffff !important;
      z-index: 9999 !important;
      transition: box-shadow 0.4s ease, border-color 0.4s ease;
    }

    @keyframes smoothRiverFlow {
      0% { transform: translate3d(0, 0, 0) rotate(var(--rot)); }
      50% { transform: translate3d(var(--dx1), var(--dy1), 0) rotate(calc(var(--rot) + 2deg)); }
      100% { transform: translate3d(var(--dx2), var(--dy2), 0) rotate(calc(var(--rot) - 2deg)); }
    }

    @keyframes pasteIn {
      from { opacity: 0; transform: scale(1) rotate(calc(var(--rot) + 3deg)); }
      to { opacity: 0.92; transform: scale(1) rotate(var(--rot)); }
    }

    .sticky-note:hover {
      opacity: 1 !important;
      transform: scale(1.08) rotate(0deg) !important;
      z-index: 9999 !important;
      box-shadow: 0 18px 38px rgba(58, 46, 43, 0.22);
    }

    .sticky-content {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
      color: #2b211f;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      max-height: 65px; 
    }

    .more-indicator {
      color: #70504a;
      font-size: 10px;
      font-weight: bold;
      text-align: right;
      margin-top: 1px;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px dashed rgba(58, 46, 43, 0.18);
      padding-top: 4px;
      margin-top: 2px;
    }

    .author-group {
      display: flex;
      align-items: center;
      gap: 3px;
      max-width: 110px;
    }

    .sticky-author {
      font-size: 11px;
      font-weight: 700;
      color: #5c423d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 65px;
    }

    .icon-btn-inline {
      font-family: var(--main-font);
      background: transparent;
      border: none;
      font-size: 11px;
      cursor: pointer;
      color: #5c423d;
      padding: 0 1px;
      line-height: 1;
      transition: transform 0.2s;
    }
    .icon-btn-inline:hover { transform: scale(1.25); }

    .like-btn {
      font-family: var(--main-font);
      background: transparent;
      border: none;
      font-size: 11px;
      cursor: pointer;
      color: #b54545;
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 1px;
      transition: transform 0.2s;
    }
    .like-btn:hover { transform: scale(1.15); }

    /* ---------------- 階段 3：點擊查看全文彈窗 ---------------- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100svh;
      background: rgba(58, 46, 43, 0.35);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .modal-card {
      font-family: var(--main-font);
      width: 100%;
      max-width: 380px;
      min-height: 200px;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 25px 50px rgba(58, 46, 43, 0.25);
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      z-index: 2001;
      transition: background-color 0.2s ease;
    }

    .modal-text {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.6;
      color: #2b211f;
      max-height: 260px;
      overflow-y: auto;
      word-break: break-word;
      white-space: pre-wrap;
      padding-right: 28px;
    }

    .modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      border-top: 1px dashed rgba(58, 46, 43, 0.2);
      padding-top: 8px;
    }

    .modal-author {
      font-size: 13px;
      font-weight: 700;
      color: #5c423d;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .modal-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: transparent;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #5c423d;
      padding: 4px;
    }

    .re-enter-btn {
      font-family: var(--main-font);
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--accent-rose);
      color: #ffffff;
      font-weight: 700;
      border: none;
      padding: 14px 24px;
      border-radius: 35px;
      cursor: pointer;
      font-size: 15px;
      z-index: 3000;
      box-shadow: 0 8px 20px rgba(139, 90, 82, 0.35);
      display: block; 
    }
  </style>
</head>
<body>

  <!-- 右上角鎖頭與 Hover/Click 控制區塊 -->
  <div class="admin-container" id="adminContainer">
    <button class="admin-toggle-btn" id="adminToggleBtn">🔒</button>
    
    <div class="admin-panel" id="adminPanel">
      <input type="password" id="adminPasswordInput" placeholder="" />
      
      <div id="adminDashboardSection" style="display: none;">
        <div class="admin-dashboard">
          <div class="admin-stat-item">
            <span>總便利貼張數:</span>
            <span class="admin-stat-value" id="statTotalNotes">0</span>
          </div>
          <div class="admin-stat-item">
            <span>累積總讚數:</span>
            <span class="admin-stat-value" id="statTotalLikes">0</span>
          </div>
        </div>
        <button class="export-btn" id="exportCsvBtn" style="margin-top: 8px;">📥 匯出 CSV 備份</button>
      </div>
    </div>
  </div>

  <!-- 1. 輸入/編輯面板 -->
  <div class="input-stage" id="inputStage">
    <div class="input-card">
      <button class="close-btn" id="closeBtn">✕</button>
      <h1 id="inputStageTitle">✍️ 寫一張玫瑰花園漂漂河</h1>
      
      <div class="field-group">
        <div class="error-msg" id="nicknameErr">請輸入暱稱! (最多7字)</div>
        <input type="text" id="nickname" placeholder="暱稱 (最多7字)..." maxlength="7" />
      </div>

      <div class="field-group">
        <div class="error-msg" id="threadsErr">請輸入Threads帳號!</div>
        <input type="text" id="threads" placeholder="Threads帳號..." maxlength="30" />
      </div>

      <div class="field-group">
        <div class="error-msg" id="messageErr">請輸入想說的話!</div>
        <textarea id="message" placeholder="想說的話..."></textarea>
      </div>

      <button class="submit-btn" id="submitBtn">送出便利貼</button>
    </div>
  </div>

  <!-- 2. 滾動畫布 -->
  <div class="viewport" id="viewport">
    <div class="board-stage" id="boardStage"></div>
  </div>

  <!-- 3. 查看全文彈窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card" id="modalCard">
      <button class="modal-close" id="modalCloseBtn">✕</button>
      <div class="modal-text" id="modalText"></div>
      <div class="modal-footer">
        <div class="modal-author">
          <span id="modalAuthor"></span>
          <button class="icon-btn-inline" id="modalEditBtn" style="display:none;" title="編輯">✏️</button>
          <button class="icon-btn-inline" id="modalDeleteBtn" style="display:none;" title="刪除">🗑️</button>
        </div>
        <div class="modal-actions">
          <button class="like-btn" id="modalLikeBtn">💗 <span id="modalLikeCount">0</span></button>
        </div>
      </div>
    </div>
  </div>

  <button class="re-enter-btn" id="reEnterBtn"> Paste📝</button>

  <script type="module">
    let lastHue = null;
    let isAdmin = localStorage.getItem('isAdminUnlocked') === 'true';
    let editingDocId = null; 
    let allNotesMap = new Map();

    function getMyNotesHistory() {
      try {
        return JSON.parse(localStorage.getItem('my_sticky_notes') || '{}');
      } catch (e) {
        return {};
      }
    }

    function saveMyNoteToHistory(docId) {
      const history = getMyNotesHistory();
      history[docId] = Date.now();
      localStorage.setItem('my_sticky_notes', JSON.stringify(history));
    }

    function removeMyNoteFromHistory(docId) {
      const history = getMyNotesHistory();
      delete history[docId];
      localStorage.setItem('my_sticky_notes', JSON.stringify(history));
    }

    function isWithinFifteenMinutes(docId) {
      const history = getMyNotesHistory();
      const createdTime = history[docId];
      if (!createdTime) return false;

      const elapsedMs = Date.now() - createdTime;
      const fifteenMinsMs = 15 * 60 * 1000;
      return elapsedMs < fifteenMinsMs;
    }

    const adminContainer = document.getElementById('adminContainer');
    const adminToggleBtn = document.getElementById('adminToggleBtn');
    const adminPanel = document.getElementById('adminPanel');
    const adminPasswordInput = document.getElementById('adminPasswordInput');
    const adminDashboardSection = document.getElementById('adminDashboardSection');
    const statTotalNotes = document.getElementById('statTotalNotes');
    const statTotalLikes = document.getElementById('statTotalLikes');
    const exportCsvBtn = document.getElementById('exportCsvBtn');

    function refreshAdminUI() {
      if (isAdmin) {
        document.body.classList.add('is-unlocked');
        adminToggleBtn.innerText = '🔓';
        adminPasswordInput.style.display = 'none';
        adminDashboardSection.style.display = 'block';
        adminPanel.style.display = '';
        updateAdminDashboardStats();
      } else {
        document.body.classList.remove('is-unlocked');
        adminToggleBtn.innerText = '🔒';
        adminPasswordInput.style.display = 'block';
        adminDashboardSection.style.display = 'none';
        adminPanel.style.display = 'none';
      }
    }

    refreshAdminUI();

    document.addEventListener('DOMContentLoaded', () => {
      adminToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isAdmin) {
          isAdmin = false;
          localStorage.removeItem('isAdminUnlocked');
          refreshAdminUI();
          location.reload();
        } else {
          adminPanel.style.display = adminPanel.style.display === 'flex' ? 'none' : 'flex';
          if (adminPanel.style.display === 'flex') {
            adminPasswordInput.value = '';
            adminPasswordInput.focus();
          }
        }
      });

      adminPasswordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          if (adminPasswordInput.value === "two851011") {
            isAdmin = true;
            localStorage.setItem('isAdminUnlocked', 'true');
            adminPasswordInput.value = '';
            refreshAdminUI();
            location.reload();
          } else {
            adminPasswordInput.value = '';
            adminPasswordInput.focus();
          }
        }
      });

      document.addEventListener('click', (e) => {
        if (!isAdmin && adminPanel && !adminContainer.contains(e.target)) {
          adminPanel.style.display = 'none';
        }
      });

      exportCsvBtn.addEventListener('click', () => {
        exportNotesToCsv();
      });

      setInterval(() => {
        allNotesMap.forEach((_, id) => {
          updateNoteInlineUI(id);
        });
      }, 15000);
    });

    function updateNoteInlineUI(docId) {
      const valid = isWithinFifteenMinutes(docId);
      const editBtn = document.getElementById(`edit-btn-${docId}`);
      const delBtn = document.getElementById(`del-btn-${docId}`);

      if (!isAdmin && !valid) {
        if (editBtn) editBtn.style.display = 'none';
        if (delBtn) delBtn.style.display = 'none';
      }
    }

    function updateAdminDashboardStats() {
      let totalNotes = allNotesMap.size;
      let totalLikes = 0;
      allNotesMap.forEach(data => {
        totalLikes += (data.likes || 0);
      });
      if (statTotalNotes) statTotalNotes.innerText = totalNotes;
      if (statTotalLikes) statTotalLikes.innerText = totalLikes;
    }

    function exportNotesToCsv() {
      if (allNotesMap.size === 0) {
        alert("目前沒有可導出的便利貼資料！");
        return;
      }

      let csvRows = [["ID", "暱稱", "Threads帳號", "想說的話", "按讚數", "時間"]];

      allNotesMap.forEach((data, id) => {
        let dateStr = "";
        if (data.timestamp && data.timestamp.toDate) {
          dateStr = data.timestamp.toDate().toLocaleString();
        }
        let nickname = `"${(data.nickname || '').replace(/"/g, '""')}"`;
        let threads = `"${(data.threads || '').replace(/"/g, '""')}"`;
        let text = `"${(data.text || '').replace(/"/g, '""')}"`;
        let likes = data.likes || 0;

        csvRows.push([id, nickname, threads, text, likes, `"${dateStr}"`]);
      });

      let csvContent = "\uFEFF" + csvRows.map(e => e.join(",")).join("\n");
      let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      let url = URL.createObjectURL(blob);
      let link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", `玫瑰花園留言備份_${new Date().toISOString().slice(0,10)}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function generateDynamicMorandiColor() {
      let hue;
      do {
        hue = Math.floor(Math.random() * 360);
      } while (lastHue !== null && Math.abs(hue - lastHue) < 25);
      lastHue = hue;

      const saturation = Math.floor(Math.random() * 20) + 40;
      const lightness = Math.floor(Math.random() * 8) + 86;
      return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    }

    const NOTES_PER_PAGE = 15;
    const NOTE_WIDTH = 170;
    const NOTE_HEIGHT = 140;

    let globalNoteCount = 0;
    const renderedDocIds = new Set();
    let currentUnusedSlotsInPage = [];

    function generatePosition(index) {
      const isMobile = window.innerWidth <= 768;
      
      if (isMobile) {
        const cols = 2;
        const colWidth = window.innerWidth / cols;
        const colIndex = index % cols;
        const rowIndex = Math.floor(index / cols);
        
        const x = colIndex * colWidth + (colWidth - NOTE_WIDTH) / 2;
        const y = rowIndex * (NOTE_HEIGHT + 24) + 30;
        return { x, y };
      } else {
        if (currentUnusedSlotsInPage.length === 0) {
          const pageIndex = Math.floor(index / NOTES_PER_PAGE);
          const pageWidth = window.innerWidth;
          const pageHeight = window.innerHeight;
          const cols = 5;
          const rows = 3;
          const cellWidth = pageWidth / cols;
          const cellHeight = pageHeight / rows;
          let slots = [];

          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const cellX = pageIndex * pageWidth + c * cellWidth;
              const cellY = r * cellHeight;
              const maxOffsetX = Math.max(0, cellWidth - NOTE_WIDTH - 20);
              const maxOffsetY = Math.max(0, cellHeight - NOTE_HEIGHT - 20);
              const randomX = cellX + 10 + Math.floor(Math.random() * maxOffsetX);
              const randomY = cellY + 10 + Math.floor(Math.random() * maxOffsetY);
              slots.push({ x: randomX, y: randomY });
            }
          }

          for (let i = slots.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [slots[i], slots[j]] = [slots[j], slots[i]];
          }
          currentUnusedSlotsInPage = slots;
        }
        return currentUnusedSlotsInPage.pop();
      }
    }

    const checkFirebase = setInterval(() => {
      if (window.messagesRef) {
        clearInterval(checkFirebase);
        initApp();
      }
    }, 100);

    function initApp() {
      const inputStage = document.getElementById('inputStage');
      const inputStageTitle = document.getElementById('inputStageTitle');
      const nicknameInput = document.getElementById('nickname');
      const threadsInput = document.getElementById('threads');
      const messageInput = document.getElementById('message');
      
      const nicknameErr = document.getElementById('nicknameErr');
      const threadsErr = document.getElementById('threadsErr');
      const messageErr = document.getElementById('messageErr');

      const submitBtn = document.getElementById('submitBtn');
      const reEnterBtn = document.getElementById('reEnterBtn');
      const closeBtn = document.getElementById('closeBtn');

      const modalOverlay = document.getElementById('modalOverlay');
      const modalCloseBtn = document.getElementById('modalCloseBtn');
      const modalDeleteBtn = document.getElementById('modalDeleteBtn');
      const modalEditBtn = document.getElementById('modalEditBtn');
      const modalLikeBtn = document.getElementById('modalLikeBtn');
      const viewport = document.getElementById('viewport');

      function clearErrors() {
        nicknameErr.style.display = 'none';
        threadsErr.style.display = 'none';
        messageErr.style.display = 'none';
      }

      function hideInputModal() {
        inputStage.style.display = 'none';
        editingDocId = null;
        clearErrors();
      }

      function openEditStage(targetDocId) {
        clearErrors();
        editingDocId = targetDocId;

        inputStageTitle.innerText = "✏️ 編輯便利貼";
        submitBtn.innerText = "儲存修改";
        const data = allNotesMap.get(editingDocId);
        if (data) {
          nicknameInput.value = data.nickname || '';
          threadsInput.value = data.threads || '';
          messageInput.value = data.text || '';
        }

        inputStage.style.display = 'flex';
        nicknameInput.focus();
      }

      function showInputModal() {
        clearErrors();
        editingDocId = null;

        inputStageTitle.innerText = "✍️ 寫一張玫瑰花園漂漂河";
        submitBtn.innerText = "送出便利貼";
        nicknameInput.value = '';
        threadsInput.value = '';
        messageInput.value = '';

        inputStage.style.display = 'flex';
        nicknameInput.focus();
      }

      modalCloseBtn.addEventListener('click', () => { modalOverlay.style.display = 'none'; });
      modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.style.display = 'none';
      });

      modalLikeBtn.addEventListener('click', async () => {
        const docId = modalLikeBtn.dataset.currentId;
        if (docId) {
          try {
            const noteRef = window.doc(window.db, "sticky_notes", docId);
            await window.updateDoc(noteRef, {
              likes: window.increment(1)
            });
          } catch (err) {
            console.log("按讚失敗：" + err.message);
          }
        }
      });

      modalEditBtn.addEventListener('click', () => {
        const docId = modalEditBtn.dataset.currentId;
        if (docId) {
          modalOverlay.style.display = 'none';
          openEditStage(docId);
        }
      });

      modalDeleteBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const docId = modalDeleteBtn.dataset.currentId;
        if (docId) {
          modalOverlay.style.display = 'none';
          await deleteNoteFromCloud(docId);
        }
      });

      let isMouseDown = false;
      let startX = 0, startY = 0;
      let startScrollLeft = 0, startScrollTop = 0;
      let velocityX = 0, velocityY = 0;
      let lastX = 0, lastY = 0;
      let animationFrameId = null;

      function stopInertia() {
        if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
      }

      function applyInertia() {
        const isMobile = window.innerWidth <= 768;
        if (isMobile) {
          if (Math.abs(velocityY) > 0.5) {
            viewport.scrollTop -= velocityY;
            velocityY *= 0.92;
            animationFrameId = requestAnimationFrame(applyInertia);
          } else { velocityY = 0; }
        } else {
          if (Math.abs(velocityX) > 0.5) {
            viewport.scrollLeft -= velocityX;
            velocityX *= 0.92;
            animationFrameId = requestAnimationFrame(applyInertia);
          } else { velocityX = 0; }
        }
      }

      viewport.addEventListener('mousedown', (e) => {
        if (e.target.closest('.sticky-note') || e.target.closest('.re-enter-btn') || e.target.closest('.input-stage') || e.target.closest('.admin-container')) return;
        stopInertia();
        isMouseDown = true;
        startX = e.pageX;
        startY = e.pageY;
        lastX = e.pageX;
        lastY = e.pageY;
        startScrollLeft = viewport.scrollLeft;
        startScrollTop = viewport.scrollTop;
        velocityX = 0;
        velocityY = 0;
      });

      window.addEventListener('mousemove', (e) => {
        if (!isMouseDown) return;
        e.preventDefault();
        const isMobile = window.innerWidth <= 768;
        if (isMobile) {
          const currentY = e.pageY;
          viewport.scrollTop = startScrollTop - (currentY - startY);
          velocityY = currentY - lastY;
          lastY = currentY;
        } else {
          const currentX = e.pageX;
          viewport.scrollLeft = startScrollLeft - (currentX - startX);
          velocityX = currentX - lastX;
          lastX = currentX;
        }
      });

      window.addEventListener('mouseup', () => {
        if (!isMouseDown) return;
        isMouseDown = false;
        applyInertia();
      });

      viewport.addEventListener('wheel', (e) => {
        stopInertia();
        const isMobile = window.innerWidth <= 768;
        if (isMobile) {
          if (e.deltaY !== 0) viewport.scrollTop += e.deltaY;
        } else {
          if (e.deltaY !== 0) viewport.scrollLeft += e.deltaY;
        }
      }, { passive: true });

      const q = window.query(window.messagesRef, window.limit(100));
      
      window.getDocs(q).then((querySnapshot) => {
        querySnapshot.forEach((docSnap) => {
          const docId = docSnap.id;
          const data = docSnap.data();
          allNotesMap.set(docId, data);
          if (!renderedDocIds.has(docId)) {
            renderedDocIds.add(docId);
            createStickyNote(docId, data);
          }
        });
        updateAdminDashboardStats();
      }).catch((err) => {
        console.log("初始化載入中...");
      });

      window.onSnapshot(q, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          const docId = change.doc.id;
          const data = change.doc.data();

          if (change.type === "added") {
            allNotesMap.set(docId, data);
            if (!renderedDocIds.has(docId)) {
              renderedDocIds.add(docId);
              createStickyNote(docId, data);
            }
          }
          if (change.type === "modified") {
            allNotesMap.set(docId, data);
            
            const noteEl = document.getElementById(`note-${docId}`);
            if (noteEl) {
              const contentEl = document.getElementById(`content-${docId}`);
              const nickname = escapeHtml(data.nickname || '無名氏');
              const threads = escapeHtml(data.threads || '');
              const fullText = escapeHtml(data.text || '');
              const authorText = (isAdmin && threads) ? `— ${nickname} (@${threads})` : `— ${nickname}`;

              if (contentEl) contentEl.innerText = fullText;
              const authorEl = noteEl.querySelector('.sticky-author');
              if (authorEl) {
                authorEl.innerText = authorText;
                authorEl.title = authorText;
              }
              const countEl = document.getElementById(`like-count-${docId}`);
              if (countEl) countEl.innerText = data.likes || 0;
            }

            const modalLikeBtn = document.getElementById('modalLikeBtn');
            const modalLikeCount = document.getElementById('modalLikeCount');
            if (modalOverlay.style.display === 'flex' && modalLikeBtn.dataset.currentId === docId) {
              modalLikeCount.innerText = data.likes || 0;
            }
          }
          if (change.type === "removed") {
            allNotesMap.delete(docId);
            renderedDocIds.delete(docId);
            removeMyNoteFromHistory(docId);

            const el = document.getElementById(`note-${docId}`);
            if (el) el.remove();
            if (modalOverlay.style.display === 'flex' && modalDeleteBtn.dataset.currentId === docId) {
              modalOverlay.style.display = 'none';
            }
          }
        });
        updateAdminDashboardStats();
      });

      async function submitNote() {
        clearErrors();
        const nickname = nicknameInput.value.trim();
        const threads = threadsInput.value.trim();
        const text = messageInput.value.trim();

        let hasError = false;

        if (!nickname || nickname.length > 7) {
          nicknameErr.style.display = 'block';
          hasError = true;
        }
        if (!threads) {
          threadsErr.style.display = 'block';
          hasError = true;
        }
        if (!text) {
          messageErr.style.display = 'block';
          hasError = true;
        }

        if (hasError) return;

        submitBtn.innerText = editingDocId ? "儲存中..." : "傳送中...";
        submitBtn.disabled = true;

        try {
          if (window.messagesRef) {
            if (editingDocId) {
              const noteRef = window.doc(window.db, "sticky_notes", editingDocId);
              await window.updateDoc(noteRef, {
                nickname: nickname,
                threads: threads,
                text: text
              });

              const currentData = allNotesMap.get(editingDocId) || {};
              currentData.nickname = nickname;
              currentData.threads = threads;
              currentData.text = text;
              allNotesMap.set(editingDocId, currentData);

            } else {
              const tempId = "temp-" + Date.now();
              const noteData = {
                nickname: nickname,
                threads: threads,
                text: text,
                likes: 0
              };

              renderedDocIds.add(tempId);
              const element = createStickyNote(tempId, noteData, true);

              if (element) {
                setTimeout(() => {
                  const noteX = parseFloat(element.style.left);
                  const noteY = parseFloat(element.style.top);
                  const isMobile = window.innerWidth <= 768;

                  if (isMobile) {
                    viewport.scrollTo({ top: Math.max(0, noteY - 100), behavior: 'smooth' });
                  } else {
                    viewport.scrollTo({ left: Math.max(0, noteX - window.innerWidth / 2 + 100), behavior: 'smooth' });
                  }

                  // 點亮白光（不淡出，時間到直接移除 class）
                  element.classList.add('new-paste-flash');
                  setTimeout(() => { element.classList.remove('new-paste-flash'); }, 2800);
                }, 50);
              }

              const docRef = await window.addDoc(window.messagesRef, {
                ...noteData,
                timestamp: window.serverTimestamp()
              });

              const realId = docRef.id;

              saveMyNoteToHistory(realId);
              allNotesMap.set(realId, noteData);
              renderedDocIds.add(realId);
              renderedDocIds.delete(tempId);

              if (element) {
                element.id = `note-${realId}`;
                const editBtn = element.querySelector('.icon-btn-inline[title="編輯"]');
                const delBtn = element.querySelector('.icon-btn-inline[title="刪除"]');
                const likeBtn = element.querySelector('.like-btn');

                if (editBtn) editBtn.id = `edit-btn-${realId}`;
                if (delBtn) delBtn.id = `del-btn-${realId}`;
                if (likeBtn) likeBtn.id = `like-btn-${realId}`;
              }
            }

            nicknameInput.value = '';
            threadsInput.value = '';
            messageInput.value = '';
            
            inputStage.style.display = 'none';
            editingDocId = null;
          }
        } catch (err) {
          console.log("操作失敗：" + err.message);
        } finally {
          submitBtn.innerText = "送出便利貼";
          submitBtn.disabled = false;
        }
      }

      submitBtn.addEventListener('click', submitNote);
      closeBtn.addEventListener('click', hideInputModal);
      reEnterBtn.addEventListener('click', showInputModal);
    }

    function createStickyNote(docId, data, forceCanEdit = false) {
      const boardStage = document.getElementById('boardStage');
      if (!boardStage) return null;

      let note = document.getElementById(`note-${docId}`);
      if (note) return note;

      note = document.createElement('div');
      note.className = 'sticky-note';
      note.id = `note-${docId}`;

      const randomColor = generateDynamicMorandiColor();
      note.style.backgroundColor = randomColor;

      const pos = generatePosition(globalNoteCount);
      globalNoteCount++;

      note.style.left = `${pos.x}px`;
      note.style.top = `${pos.y}px`;

      const isMobile = window.innerWidth <= 768;
      if (isMobile) {
        const requiredHeight = pos.y + NOTE_HEIGHT + 60;
        if (requiredHeight > boardStage.offsetHeight) {
          boardStage.style.height = `${requiredHeight}px`;
        }
      } else {
        const pageIndex = Math.floor((globalNoteCount - 1) / NOTES_PER_PAGE);
        const minCanvasWidth = (pageIndex + 1) * window.innerWidth;
        if (minCanvasWidth > boardStage.offsetWidth) {
          boardStage.style.width = `${minCanvasWidth}px`;
        }
      }

      const randomRot = (Math.random() * 16 - 8).toFixed(1);
      const dx1 = (Math.random() * 12 - 6).toFixed(0) + 'px';
      const dy1 = (Math.random() * 12 - 6).toFixed(0) + 'px';
      const dx2 = (Math.random() * 14 - 7).toFixed(0) + 'px';
      const dy2 = (Math.random() * 14 - 7).toFixed(0) + 'px';
      const duration = (Math.random() * 4 + 10).toFixed(1) + 's';

      note.style.setProperty('--rot', `${randomRot}deg`);
      note.style.setProperty('--dx1', dx1);
      note.style.setProperty('--dy1', dy1);
      note.style.setProperty('--dx2', dx2);
      note.style.setProperty('--dy2', dy2);
      note.style.animationDuration = `0.5s, ${duration}`;

      const nickname = escapeHtml(data.nickname || '無名氏');
      const threads = escapeHtml(data.threads || '');
      const fullText = escapeHtml(data.text || '');
      const likesCount = data.likes || 0;

      const authorText = (isAdmin && threads) ? `— ${nickname} (@${threads})` : `— ${nickname}`;
      const canEditDelete = forceCanEdit || isAdmin || isWithinFifteenMinutes(docId);

      note.innerHTML = `
        <div>
          <div class="sticky-content" id="content-${docId}">${fullText}</div>
          <div class="more-indicator" id="indicator-${docId}" style="display:none;">[...more]</div>
        </div>
        <div class="footer-row">
          <div class="author-group">
            <div class="sticky-author" title="${authorText}">${authorText}</div>
            ${canEditDelete ? `<button class="icon-btn-inline" id="edit-btn-${docId}" title="編輯">✏️</button>` : ''}
            ${canEditDelete ? `<button class="icon-btn-inline" id="del-btn-${docId}" title="刪除">🗑️</button>` : ''}
          </div>
          <button class="like-btn" id="like-btn-${docId}">💗 <span id="like-count-${docId}">${likesCount}</span></button>
        </div>
      `;

      boardStage.appendChild(note);

      setTimeout(() => {
        const contentEl = document.getElementById(`content-${docId}`);
        const indicatorEl = document.getElementById(`indicator-${docId}`);
        if (contentEl && indicatorEl && contentEl.scrollHeight > contentEl.clientHeight) {
          indicatorEl.style.display = 'block';
        }
      }, 50);

      // 按讚
      const likeBtn = note.querySelector('.like-btn');
      if (likeBtn) {
        likeBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const targetId = note.id.replace('note-', '');
          if (targetId.startsWith('temp-')) return;
          try {
            const noteRef = window.doc(window.db, "sticky_notes", targetId);
            await window.updateDoc(noteRef, { likes: window.increment(1) });
          } catch (err) {
            console.log("按讚失敗：" + err.message);
          }
        });
      }

      // 編輯
      const editBtn = note.querySelector('.icon-btn-inline[title="編輯"]');
      if (editBtn) {
        editBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          document.getElementById('modalOverlay').style.display = 'none';
          
          const targetId = note.id.replace('note-', '');
          editingDocId = targetId;
          const currentData = allNotesMap.get(targetId) || data;
          
          document.getElementById('inputStageTitle').innerText = "✏️ 編輯便利貼";
          document.getElementById('submitBtn').innerText = "儲存修改";
          document.getElementById('nickname').value = currentData.nickname || '';
          document.getElementById('threads').value = currentData.threads || '';
          document.getElementById('message').value = currentData.text || '';
          document.getElementById('inputStage').style.display = 'flex';
        });
      }

      // 刪除
      const delBtn = note.querySelector('.icon-btn-inline[title="刪除"]');
      if (delBtn) {
        delBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const targetId = note.id.replace('note-', '');
          await deleteNoteFromCloud(targetId);
        });
      }

      // 點開放大 Modal
      note.addEventListener('click', () => {
        const targetId = note.id.replace('note-', '');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalCard = document.getElementById('modalCard');
        const modalText = document.getElementById('modalText');
        const modalAuthor = document.getElementById('modalAuthor');
        const modalDeleteBtn = document.getElementById('modalDeleteBtn');
        const modalEditBtn = document.getElementById('modalEditBtn');
        const modalLikeBtn = document.getElementById('modalLikeBtn');
        const modalLikeCount = document.getElementById('modalLikeCount');
        
        modalCard.style.backgroundColor = randomColor;

        const currentData = allNotesMap.get(targetId) || data;
        const currentNickname = escapeHtml(currentData.nickname || '無名氏');

        modalText.innerText = currentData.text || '';
        modalAuthor.innerText = (isAdmin && currentData.threads) ? `— ${currentNickname} (@${escapeHtml(currentData.threads)})` : `— ${currentNickname}`;
        modalLikeCount.innerText = currentData.likes || 0;

        modalDeleteBtn.dataset.currentId = targetId;
        modalEditBtn.dataset.currentId = targetId;
        modalLikeBtn.dataset.currentId = targetId;

        const valid = forceCanEdit || isAdmin || isWithinFifteenMinutes(targetId);
        if (valid) {
          modalDeleteBtn.style.display = 'inline-block';
          modalEditBtn.style.display = 'inline-block';
        } else {
          modalDeleteBtn.style.display = 'none';
          modalEditBtn.style.display = 'none';
        }

        modalOverlay.style.display = 'flex';
      });

      return note;
    }

    async function deleteNoteFromCloud(docId) {
      try {
        if (docId.startsWith('temp-')) {
          const el = document.getElementById(`note-${docId}`);
          if (el) el.remove();
          return;
        }
        if (window.deleteDoc && window.doc && window.db) {
          await window.deleteDoc(window.doc(window.db, "sticky_notes", docId));
          removeMyNoteFromHistory(docId);
        }
      } catch (err) {
        console.log("刪除失敗：" + err.message);
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
